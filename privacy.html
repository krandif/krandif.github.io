<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>肖像権とプライバシーの侵害 - 生成AIの倫理感</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f8f8;
        }
        header {
            background-color: #00704A;
            color: white;
            padding: 20px;
            text-align: center;
        }
        h1 {
            font-size: 32px;
            margin: 0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 30px;
        }
        .content-box {
            background-color: #F7F5E8;
            border: 2px solid #C2A661;
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 30px;
        }
        .icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: #C2A661;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 20px;
        }
        h2 {
            color: #C2A661;
            text-align: center;
            font-size: 28px;
            margin-top: 0;
            margin-bottom: 30px;
        }
        ul {
            padding-left: 20px;
        }
        li {
            margin-bottom: 15px;
            font-size: 18px;
            line-height: 1.6;
        }
        .back-button {
            display: inline-block;
            background-color: #00704A;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            margin-bottom: 20px;
            transition: background-color 0.3s;
        }
        .back-button:hover {
            background-color: #005038;
        }
        .corner-circle {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background-color: white;
            position: fixed;
        }
        .top-left {
            top: 15px;
            left: 15px;
        }
        .top-right {
            top: 15px;
            right: 15px;
        }
        .bottom-left {
            bottom: 15px;
            left: 15px;
        }
        .bottom-right {
            bottom: 15px;
            right: 15px;
        }
    </style>
</head>
<body>
    <!-- スターバックス風デザイン用の丸 -->
    <div class="corner-circle top-left"></div>
    <div class="corner-circle top-right"></div>
    <div class="corner-circle bottom-left"></div>
    <div class="corner-circle bottom-right"></div>

    <header>
        <h1>生成AIの倫理感</h1>
    </header>
    
    <div class="container">
        <a href="index.html" class="back-button">← トップに戻る</a>
        
        <div class="content-box">
            <div class="icon">👤</div>
            <h2>肖像権とプライバシーの侵害</h2>
            
            <ul>
                <li>実在の人物に似た画像生成による肖像権侵害のリスク</li>
                <li>許可なく特定の人物の特徴を用いた画像生成の問題</li>
                <li>公人や有名人の顔を使った不適切なコンテンツ作成</li>
            </ul>
        </div>
    </div>
</body>
</html>
