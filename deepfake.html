<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ディープフェイクと偽情報 - 生成AIの倫理感</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f8f8;
        }
        header {
            background-color: #00704A;
            color: white;
            padding: 20px;
            text-align: center;
        }
        h1 {
            font-size: 32px;
            margin: 0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 30px;
        }
        .content-box {
            background-color: #F0E6E6;
            border: 2px solid #A61C1C;
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 30px;
        }
        .icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: #A61C1C;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 20px;
        }
        h2 {
            color: #A61C1C;
            text-align: center;
            font-size: 28px;
            margin-top: 0;
            margin-bottom: 30px;
        }
        ul {
            padding-left: 20px;
        }
        li {
            margin-bottom: 15px;
            font-size: 18px;
            line-height: 1.6;
        }
        .back-button {
            display: inline-block;
            background-color: #00704A;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            margin-bottom: 20px;
            transition: background-color 0.3s;
        }
        .back-button:hover {
            background-color: #005038;
        }
        .corner-circle {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background-color: white;
            position: fixed;
        }
        .top-left {
            top: 15px;
            left: 15px;
        }
        .top-right {
            top: 15px;
            right: 15px;
        }
        .bottom-left {
            bottom: 15px;
            left: 15px;
        }
        .bottom-right {
            bottom: 15px;
            right: 15px;
        }
    </style>
</head>
<body>
    <!-- スターバックス風デザイン用の丸 -->
    <div class="corner-circle top-left"></div>
    <div class="corner-circle top-right"></div>
    <div class="corner-circle bottom-left"></div>
    <div class="corner-circle bottom-right"></div>

    <header>
        <h1>生成AIの倫理感</h1>
    </header>
    
    <div class="container">
        <a href="index.html" class="back-button">← トップに戻る</a>
        
        <div class="content-box">
            <div class="icon">!</div>
            <h2>ディープフェイクと偽情報</h2>
            
            <ul>
                <li>実在しない出来事や場面の高品質な偽画像の作成</li>
                <li>ニュースや報道を偽装した誤情報の拡散</li>
                <li>政治的・社会的混乱を招く悪用のリスク</li>
            </ul>
        </div>
    </div>
</body>
</html>
